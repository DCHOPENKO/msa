server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: localhost

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Route requests to order-service
            - id: order-service-route
              uri: lb://order-service
              predicates:
                - Path=/order-service/**
              filters:
                - StripPrefix=1

            # Route requests to payment-service
            - id: payment-service-route
              uri: lb://payment-service
              predicates:
                - Path=/payment-service/**
              filters:
                - StripPrefix=1

            # Route requests to delivery-service
            - id: delivery-service-route
              uri: lb://delivery-service
              predicates:
                - Path=/delivery-service/**
              filters:
                - StripPrefix=1

            # Route requests to the gateway's aggregated order-details endpoint
            - id: order-details-route
              uri: forward:/
              predicates:
                - Path=/api/v1/order-details/**
